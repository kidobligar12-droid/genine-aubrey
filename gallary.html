<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: #0f172a;
        color: white;
        text-align: center;
    }

    h1 {
        margin: 30px 0;
        font-size: 40px;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 15px;
        padding: 20px;
    }

    .item {
        position: relative;
        overflow: hidden;
        border-radius: 10px;
    }

    .item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: 0.4s;
    }

    .item:hover img {
        transform: scale(1.1);
    }

    .overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.6);
        opacity: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: 0.4s;
    }

    .item:hover .overlay {
        opacity: 1;
    }

    .text {
        color: #00ffd5;
        font-size: 18px;
        font-weight: bold;
    }

</style>
</head>

<body>

<h1>🖼️ My Gallery</h1>

<div class="gallery">

   <div class="gallery-card">
      <p>Basketball Highlights 4</p>
      <a href="https://www.tiktok.com/@gleny__16/video/7625648123813055762?is_from_webapp=1&sender_device=pc" target="_blank">
        View Project
      </a>
    </div>
    <!-- IMAGE 2 -->
    <div class="item">
        <img src="image2.jpg" alt="Image 2">
        <div class="overlay">
            <div class="text">Design Work</div>
        </div>
    </div>

    <!-- IMAGE 3 -->
    <div class="item">
        <img src="image3.jpg" alt="Image 3">
        <div class="overlay">
            <div class="text">Creative Idea</div>
        </div>
    </div>

    <!-- IMAGE 4 -->
    <div class="item">
        <img src="image4.jpg" alt="Image 4">
        <div class="overlay">
            <div class="text">Cool Shot</div>
        </div>
    </div>

</div>

</body>
</html>
