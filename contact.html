<!DOCTYPE html>
<html>
<head>
    <title>Contact Me</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .contact-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(12px);
            width: 320px;
            color: white;
            box-shadow: 0 0 30px rgba(0,0,0,0.4);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        textarea {
            resize: none;
            height: 80px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 20px;
            background: #00ffd5;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: white;
        }

    </style>
</head>
<body>

    <div class="contact-box">
        <h2>Contact Me ✉️</h2>
        <form onsubmit="sendMessage(event)">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message..." required></textarea>
            <button type="submit">Send Message 🚀</button>
        </form>
        <div class="footer">I'll get back to you soon!</div>
    </div>

    <script>
        function sendMessage(e) {
            e.preventDefault();
            alert("Message sent successfully! 🚀");
        }
    </script>

</body>
</html>
