<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: #0f172a;
        color: white;
        text-align: center;
    }

    h1 {
        margin: 30px 0;
        font-size: 40px;
    }

    .projects {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        padding: 20px;
    }

    .card {
        background: linear-gradient(145deg, #1e293b, #0f172a);
        border-radius: 15px;
        width: 250px;
        padding: 20px;
        transition: 0.3s;
        position: relative;
        overflow: hidden;
        cursor: pointer;
    }

    .card:hover {
        transform: translateY(-10px) scale(1.05);
        box-shadow: 0 0 20px #00ffd5;
    }

    .card::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background: linear-gradient(45deg, transparent, #00ffd5, transparent);
        transform: rotate(45deg);
        top: -100%;
        left: -100%;
        transition: 0.5s;
    }

    .card:hover::before {
        top: 100%;
        left: 100%;
    }

    h3 {
        margin-bottom: 10px;
    }

    p {
        font-size: 14px;
        opacity: 0.8;
    }

    button {
        margin-top: 15px;
        padding: 8px 15px;
        border: none;
        border-radius: 20px;
        background: #00ffd5;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover {
        background: white;
    }

    /* Modal */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.8);
        justify-content: center;
        align-items: center;
    }

    .modal-content {
        background: #1e293b;
        padding: 20px;
        border-radius: 10px;
        width: 80%;
        max-width: 400px;
    }

    .close {
        float: right;
        cursor: pointer;
        color: red;
        font-size: 20px;
    }
</style>
</head>

<body>

<h1>🚀 My Projects</h1>

<div class="projects">

    <div class="card" onclick="openModal('Project 1 details...')">
        <h3>🔥 Project One</h3>
        <p>Cool web app with animations</p>
        <button>View</button>
    </div>

    <div class="card" onclick="openModal('Project 2 details...')">
        <h3>⚡ Project Two</h3>
        <p>Creative UI design project</p>
        <button>View</button>
    </div>

    <div class="card" onclick="openModal('Project 3 details...')">
        <h3>🌐 Project Three</h3>
        <p>Interactive website concept</p>
        <button>View</button>
    </div>

</div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <p id="modalText"></p>
    </div>
</div>

<script>
function openModal(text) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalText").innerText = text;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>5
